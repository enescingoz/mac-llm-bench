# Mac LLM Benchmark - Model Registry
# Each model defines where to download, available quantizations, and requirements.
# Sources are tried in order — ungated repos are preferred to avoid auth friction.
#
# Start with Gemma 3 family as the initial benchmark set.
# Other model families can be added later by the community.

