# ─── Quantization Reference ─────────────────────────────────────────
# Q2_K   — 2-bit, smallest, lowest quality. For testing if a model loads at all.
# Q3_K_M — 3-bit medium. Significant quality loss but much faster.
# Q4_K_M — 4-bit medium. Best balance of speed/quality. Default for most benchmarks.
# Q5_K_M — 5-bit medium. Slightly better quality, slightly slower.
# Q6_K   — 6-bit. Near full quality, noticeably more RAM.
# Q8_0   — 8-bit. Near-lossless quality, ~2x RAM of Q4.
# F16    — Full 16-bit. Maximum quality, maximum RAM. Usually only for small models.
