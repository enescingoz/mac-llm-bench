  gemma-3-1b:
    name: "Gemma 3 1B"
    params: "1B"
    sources:
      - repo: "bartowski/google_gemma-3-1b-it-GGUF"
        gated: false
    quants: [Q4_K_M, Q6_K, Q8_0]
    default_quant: Q4_K_M
    file_pattern: "google_gemma-3-1b-it-{quant}.gguf"
    min_ram: 4
